<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Mizano</title>
    <link rel="stylesheet" href="./assets/css/forms.css">
    <style>
        body {
            font-family: 'Inter', 'Roboto', sans-serif;
            background: #F5F5F5;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-container {
            max-width: 400px;
            width: 90%;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .auth-logo {
            width: 60px;
            height: 60px;
            background: #1E88E5;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }

        .btn-primary {
            background: #1E88E5;
            color: white;
        }

        .btn-secondary {
            background: #607D8B;
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #1E88E5;
            color: #1E88E5;
        }

        .hidden {
            display: none;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-logo">M</div>
        <h1 style="margin-bottom: 30px;">Mizano</h1>

        <!-- CHOICE MENU -->
        <div id="choice-menu">
            <button onclick="quickLogin()" class="btn-auth btn-primary">Browser (Kao Mjekejeke)</button>
            <button onclick="location.href='signup.html'" class="btn-auth btn-outline">Sign-Up</button>
            <button onclick="showLoginForm()" class="btn-auth btn-secondary">Login</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="login-form" class="hidden">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-user" class="form-control" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>WhatsApp Number</label>
                <input type="text" id="login-whatsapp" class="form-control" placeholder="+267XXXXXXXX">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-pass" class="form-control" placeholder="••••••••">
            </div>
            <button onclick="finalLogin()" class="btn-auth btn-primary">Sign In</button>
            <button onclick="hideLoginForm()" class="btn-auth btn-secondary">Back</button>
        </div>
    </div>

    <script src="./assets/js/storage.js"></script>
    <script src="./assets/js/validation.js"></script>
    <script src="./assets/js/auth.js"></script>
    <script>
        function showLoginForm() {
            document.getElementById('choice-menu').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        }

        function hideLoginForm() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('choice-menu').classList.remove('hidden');
        }

        async function quickLogin() {
            const success = await window.MizanoAuth.loadDemoProfile();
            if (success) location.href = 'index.html';
        }

        async function finalLogin() {
            const user = document.getElementById('login-user').value;
            const wa = document.getElementById('login-whatsapp').value;
            const pass = document.getElementById('login-pass').value;

            if (!user || !wa || !pass) {
                alert('Please fill all fields');
                return;
            }

            // Simulated login: any valid-looking data works for the demo
            await window.MizanoAuth.loadDemoProfile();
            location.href = 'index.html';
        }
    </script>
</body>

</html>
