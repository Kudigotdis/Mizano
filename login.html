<!DOCTYPE html>
<!-- 
    DESIGN LOCKED: 2026-02-18
    DO NOT MODIFY UI/UX WITHOUT EXPLICIT USER APPROVAL.
    The current layout, colors, and button order are FINAL.
-->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Mizano</title>
    <!-- Atomic Spacing Grid & Variable Setup -->
    <style>
        :root {
            /* 8px Base Grid (Otter Pipeline) */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-xxl: 48px;
            --space-xxxl: 60px;

            /* Colors */
            --bg-white: #FFFFFF;
            --text-dark: #212121;
            --text-grey: #757575;
            --btn-browser: #1e88e5;
            --btn-signup: #5ba8ec;
            --btn-login: #9ac9f3;

            /* Radius & Safe Area */
            --radius-md: 8px;
            --hit-target: 44px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background: var(--bg-white);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--space-md);
            /* Margin of Safety (12px equiv for small screens) */
            overflow: hidden;
        }

        .auth-canvas {
            width: 100%;
            max-width: 400px;
            /* Max-Width Constraint */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            /* Dynamic Centering */
            transition: transform 200ms ease-out;
            will-change: transform;
        }

        /* Keyboard Slide Simulation */
        body.keyboard-up .auth-canvas {
            transform: translateY(-20vh);
        }

        /* Branding Segment (30% vertical viewport rule) */
        .branding-segment {
            margin-top: calc(var(--space-xxxl) + 2vh);
            margin-bottom: var(--space-xxl);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-box {
            width: 80px;
            height: 80px;
            margin-bottom: var(--space-sm);
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .app-name {
            font-size: 28px;
            /* 1.75rem */
            font-weight: 700;
            line-height: 1;
        }

        /* CTA Hierarchy Segment */
        .cta-segment {
            width: 90%;
            /* 90% container width rule */
            display: flex;
            flex-direction: column;
            gap: 12px;
            /* Vertical Stack Ratio */
            margin-bottom: var(--space-xl);
        }

        .btn-mizano {
            width: 100%;
            height: 48px;
            /* Min-Height Standard & 4:1 Ratio target */
            border-radius: var(--radius-md);
            border: none;
            font-size: 16px;
            font-weight: 500;
            color: #FFFFFF;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            position: relative;
            transform: translate3d(0, 0, 0);
            /* Hardware Acceleration */
            transition: opacity 150ms, transform 100ms;
        }

        /* 44px Touch Target Buffer */
        .btn-mizano::after {
            content: '';
            position: absolute;
            top: -2px;
            bottom: -2px;
            left: 0;
            right: 0;
            min-height: var(--hit-target);
        }

        .btn-mizano:active {
            transform: scale(0.98) translateY(1px);
            /* Active Tap Compression */
        }

        /* Updated Button Colors */
        .btn-browser {
            background: var(--btn-browser);
            color: #FFFFFF;
        }

        .btn-signup {
            background: var(--btn-signup);
            color: #FFFFFF;
        }

        .btn-login {
            background: var(--btn-browser);
            color: #FFFFFF;
        }

        .btn-help {
            background: transparent;
            color: #7d7d7d;
            font-size: 14px;
            font-weight: 400;
            margin-top: 4px;
            /* Slight separation */
            height: auto;
            /* Allow auto height for text button */
            min-height: 44px;
            /* Touch target */
        }

        .btn-help:active {
            transform: scale(0.98);
        }

        .cta-segment {
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            /* Slim equal spacing */
            margin-bottom: var(--space-xl);
            /* Positioning for lower 40% handled by flex alignment in main-canvas if needed, 
               but default vertical centering + margin-top on branding pushes it down. 
               We can ensure it's bottom-weighted by adding margin-top: auto to cta-segment if main-canvas has height. 
               Current auth-canvas has min-height 100vh indirectly via body centering. 
               Let's keep it simple for now, the user said "best position for the thumb" which is usually lower half. 
            */
        }

        /* Hidden States */
        .hidden {
            display: none !important;
        }

        /* Login Form Expansion */
        .login-form-box {
            width: 100%;
            display: none;
            padding-top: var(--space-md);
        }

        .login-form-box.active {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .form-control {
            width: 100%;
            height: 48px;
            padding: 0 var(--space-md);
            border: 1px solid #ddd;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-family: inherit;
        }

        .form-control:focus {
            outline: 2px solid var(--btn-browser);
            outline-offset: 2px;
        }

        .btn-back {
            background: #e0e0e0;
            color: #424242;
        }

        /* Demo Profiles Sheet */
        .demo-profiles-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 75vh;
            background: #fff;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.1);
            transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .demo-profiles-sheet.active {
            bottom: 0;
        }

        .sheet-header {
            padding: 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sheet-header h3 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: #222;
        }

        .btn-close-sheet {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #888;
            line-height: 1;
            padding: 0;
        }

        .sheet-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .profile-card {
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            background: #fafafa;
        }

        .profile-card:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .profile-card:active {
            transform: scale(0.98);
            background: #f0f0f0;
        }

        .pc-name {
            font-weight: 700;
            font-size: 16px;
            color: #111;
        }

        .pc-details {
            font-size: 14px;
            color: #555;
        }

        .pc-sports {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        /* Overlay to dim background when sheet is open */
        .sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .sheet-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>

<body>
    <div class="auth-canvas" id="main-canvas">
        <!-- Branding Segment -->
        <div class="branding-segment">
            <div class="logo-box">
                <img src="./assets/images/logo.webp" alt="Mizano Logo">
            </div>
            <h1 class="app-name">Mizano</h1>
        </div>

        <!-- CTA Hierarchy Segment -->
        <div class="cta-segment" id="cta-cluster">
            <!-- 1. Browser Button -->
            <button class="btn-mizano btn-browser" id="btn-browser">Browse</button>

            <!-- 2. Signup Button -->
            <button class="btn-mizano btn-signup" onclick="location.href='signup.html'">Signup</button>

            <!-- 3. Login Button -->
            <button class="btn-mizano btn-login" style="background: #9ac9f3;" id="btn-show-login">Login</button>

            <!-- 4. Help Text Button -->
            <button class="btn-mizano btn-help" onclick="alert('Help & Support coming soon!')">Need Help?</button>
        </div>

        <!-- Hidden Login Form -->
        <div class="login-form-box" id="login-form-container">
            <input type="text" id="login-user" class="form-control" placeholder="Username">
            <input type="tel" id="login-whatsapp" class="form-control" placeholder="+267 WhatsApp Number">
            <input type="password" id="login-pass" class="form-control" placeholder="Password">
            <button class="btn-mizano" style="background: var(--btn-browser); margin-top: 8px;"
                id="btn-final-signin">Sign In</button>
            <button class="btn-mizano btn-back" id="btn-login-back">Back</button>
        </div>
    </div>

    <!-- Background dim overlay -->
    <div class="sheet-overlay" id="sheet-overlay"></div>

    <!-- Demo Profiles Selection Sheet -->
    <div class="demo-profiles-sheet" id="demo-profiles-sheet">
        <div class="sheet-header">
            <h3>Select Demo Profile</h3>
            <button class="btn-close-sheet" id="btn-close-sheet">&times;</button>
        </div>
        <div class="sheet-content" id="demo-profiles-list">
            <!-- JS will populate 10 profiles here -->
            <div style="text-align:center; padding: 20px; color:#666;">Loading profiles...</div>
        </div>
    </div>

    <script src="./StorageManager.js"></script>
    <script src="./AuthManager.js"></script>
    <script src="./data/mizano_preview_users.js"></script>
    <script src="./assets/js/auth.js"></script>
    <script>
        const btnShowLogin = document.getElementById('btn-show-login');
        const btnLoginBack = document.getElementById('btn-login-back');
        const btnFinalSignin = document.getElementById('btn-final-signin');
        const btnBrowser = document.getElementById('btn-browser');
        const ctaCluster = document.getElementById('cta-cluster');
        const formContainer = document.getElementById('login-form-container');

        const btnCloseSheet = document.getElementById('btn-close-sheet');
        const profilesSheet = document.getElementById('demo-profiles-sheet');
        const profilesList = document.getElementById('demo-profiles-list');
        const sheetOverlay = document.getElementById('sheet-overlay');

        // Toggle Form
        btnShowLogin.onclick = () => {
            ctaCluster.classList.add('hidden');
            formContainer.classList.add('active');
        };

        btnLoginBack.onclick = () => {
            ctaCluster.classList.remove('hidden');
            formContainer.classList.remove('active');
        };

        // Close Sheet Logic
        const closeSheet = () => {
            profilesSheet.classList.remove('active');
            sheetOverlay.classList.remove('active');
        };
        btnCloseSheet.onclick = closeSheet;
        sheetOverlay.onclick = closeSheet;

        // Redirection Logic / Profile Sheet opening
        btnBrowser.onclick = async (e) => {
            e.preventDefault();
            console.log('Login: Browse button clicked. Loading preview profiles...');
            profilesSheet.classList.add('active');
            sheetOverlay.classList.add('active');

            // Use the globally injected preview users from data/mizano_preview_users.js
            const previewUsers = window.MIZANO_DATA?.preview_users || [];

            if (previewUsers.length === 0) {
                profilesList.innerHTML = `<div style="text-align:center; padding:20px; color:#666;">No preview profiles found.</div>`;
                return;
            }

            // Render profiles
            profilesList.innerHTML = previewUsers.map(p => {
                return `
                <div class="profile-card" onclick="loginWithProfile('${p.uid}')">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <img src="${p.avatar || 'https://i.pravatar.cc/150?u=' + p.uid}" style="width:40px; height:40px; border-radius:50%; border:1px solid #000;">
                        <div style="flex:1">
                            <div class="pc-name">${p.name}</div>
                            <div class="pc-details">${p.profile_type} • ${p.location}</div>
                        </div>
                    </div>
                </div>
            `}).join('');
        };

        // Handle the login selection
        window.loginWithProfile = async (uid) => {
            const previewUsers = window.MIZANO_DATA?.preview_users || [];
            const profile = previewUsers.find(p => p.uid === uid);
            if (!profile) return;

            closeSheet();

            // Show loading state
            btnBrowser.innerText = 'Logging in...';
            btnBrowser.style.opacity = '0.7';
            btnBrowser.disabled = true;

            try {
                // Ensure profile is normalized for AuthManager
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('Login process timed out after 8 seconds. Database might be locked by another tab.')), 8000)
                );
                
                const success = await Promise.race([
                    window.MizanoAuth.loadDemoProfile(profile),
                    timeoutPromise
                ]);

                if (success) {
                    console.log(`Login: Preview profile ${profile.name} loaded successfully.`);
                    window.location.href = './index.html';
                } else {
                    throw new Error('MizanoAuth.loadDemoProfile returned false - likely an inner error in saveProfile. Please check AuthManager.js');
                }
            } catch (err) {
                console.error('Login: Failed to load preview profile', err);
                // INJECTED FOR DEBUGGING: SHOW EXACT ERROR
                alert('System Error: Could not load preview profile. Details: ' + (err.message || JSON.stringify(err)));
                btnBrowser.innerText = 'Browse';
                btnBrowser.style.opacity = '1';
                btnBrowser.disabled = false;
            }
        };

        // Inline error display (replaces alert() calls)
        let _errorEl = null;
        function showLoginError(msg) {
            if (!_errorEl) {
                _errorEl = document.createElement('p');
                _errorEl.style.cssText = 'color:#D32F2F; font-size:14px; text-align:center; margin-top:4px;';
                formContainer.appendChild(_errorEl);
            }
            _errorEl.textContent = msg;
        }
        function clearLoginError() {
            if (_errorEl) _errorEl.textContent = '';
        }

        btnFinalSignin.onclick = async () => {
            clearLoginError();

            const usernameInput = document.getElementById('login-user').value.trim();
            const waInput = document.getElementById('login-whatsapp').value.trim();
            const passInput = document.getElementById('login-pass').value;

            if (!usernameInput || !waInput || !passInput) {
                showLoginError('Please fill all fields.');
                return;
            }

            // Loading state
            const origText = btnFinalSignin.textContent;
            btnFinalSignin.textContent = 'Signing in...';
            btnFinalSignin.disabled = true;
            btnFinalSignin.style.opacity = '0.7';

            try {
                // Step 1: Try a real IndexedDB lookup by username or whatsapp
                let matchedUser = null;

                if (window.mizanoStorage) {
                    await window.mizanoStorage.init();
                    const allUsers = await window.mizanoStorage.getAllUsers();
                    matchedUser = allUsers.find(u =>
                        (u.username && u.username.toLowerCase() === usernameInput.toLowerCase()) ||
                        (u.full_name && u.full_name.toLowerCase() === usernameInput.toLowerCase()) ||
                        (u.display_name && u.display_name.toLowerCase() === usernameInput.toLowerCase()) ||
                        (u.whatsapp === waInput)
                    );
                }

                // Step 2: Fallback — check preview_users for a name / whatsapp match
                if (!matchedUser) {
                    const previews = window.MIZANO_DATA?.preview_users || [];
                    const previewMatch = previews.find(p =>
                        (p.name && p.name.toLowerCase() === usernameInput.toLowerCase()) ||
                        (p.whatsapp === waInput)
                    );
                    if (previewMatch) {
                        const ok = await window.MizanoAuth.loadDemoProfile(previewMatch);
                        if (ok) {
                            btnFinalSignin.style.width = '100vw';
                            setTimeout(() => location.href = 'index.html', 150);
                            return;
                        }
                    }
                }

                if (matchedUser) {
                    // Real user found — start session and redirect
                    if (window.authManager) {
                        await window.authManager.login(matchedUser.profile_id || matchedUser.uid);
                    } else {
                        window.mizanoStorage.setCurrentUser(matchedUser.profile_id || matchedUser.uid);
                    }
                    btnFinalSignin.style.width = '100vw';
                    setTimeout(() => location.href = 'index.html', 150);
                } else {
                    // No match at all — load a generic demo and proceed
                    const ok = await window.MizanoAuth.loadDemoProfile();
                    if (ok) {
                        btnFinalSignin.style.width = '100vw';
                        setTimeout(() => location.href = 'index.html', 150);
                    } else {
                        throw new Error('Auth failed');
                    }
                }
            } catch (err) {
                console.error('Login: Sign-in error', err);
                showLoginError('Sign-in failed. Please try again.');
                btnFinalSignin.textContent = origText;
                btnFinalSignin.disabled = false;
                btnFinalSignin.style.opacity = '1';
            }
        };

        // Keyboard Simulation Helper
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.onfocus = () => document.body.classList.add('keyboard-up');
            input.onblur = () => document.body.classList.remove('keyboard-up');
        });
    </script>
</body>

</html>
